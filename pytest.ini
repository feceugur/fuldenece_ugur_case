[pytest]
markers =
    smoke:      Critical path — run before every deploy
    regression: Full regression suite
    bug:        Tests documenting defects found by this suite on the live site
    home:       Home page scenarios
    careers:    Careers page scenarios
    job_listings: Job listings scenarios
    apply:      Apply flow scenarios
    gdpr:       Cookie/consent related checks
    ai_augmented: The AI-Augmented Sub-Scenario (see prompts/04_language_switch.md)
